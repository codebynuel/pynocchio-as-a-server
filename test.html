<!DOCTYPE html>
<html>
<head><title>Pynocchio Rigging Test</title></head>
<body>
<h1>Pynocchio Auto-Rigging Server</h1>
<form id="form">
  <label>GLB File: <input type="file" id="file" accept=".glb"></label><br><br>
  <label>Skeleton:
    <select id="skeleton">
      <option value="human">Human</option>
      <option value="quad">Quad</option>
      <option value="horse">Horse</option>
      <option value="centaur">Centaur</option>
    </select>
  </label><br><br>
  <label>Scale: <input type="number" id="scale" value="1.0" step="0.1"></label><br><br>
  <button type="submit">Rig Model</button>
</form>
<pre id="status"></pre>
<a id="download" hidden>Download Rigged GLB</a>

<script>
const status = document.getElementById('status');
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const file = document.getElementById('file').files[0];
  if (!file) { status.textContent = 'No file selected'; return; }

  status.textContent = 'Uploading and rigging... (this may take a while)';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('skeleton', document.getElementById('skeleton').value);
  fd.append('scale', document.getElementById('scale').value);

  try {
    const res = await fetch('http://127.0.0.1:5000/rig', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json();
      status.textContent = 'Error: ' + (err.error || res.statusText);
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById('download');
    dl.href = url;
    dl.download = file.name.replace('.glb', '_rigged.glb');
    dl.hidden = false;
    dl.textContent = 'Download Rigged GLB (' + (blob.size / 1024).toFixed(1) + ' KB)';
    status.textContent = 'Done! Click link to download.';
  } catch (err) {
    status.textContent = 'Fetch error: ' + err.message;
  }
};
</script>
</body>
</html>
